          <h1 class="page-title">x の k 乗を N で割った余りを求める</h1>
          <hr>
<div class="grid">
  <label for="x">xの値を入力<input id="x" type="number"></label>
  <label for="k">kの値を入力<input id="k" type="number"></label>
  <label for="N">Nの値を入力<input id="N" type="number"></label>
</div>
<button id="button" onClick="execute()">計算</button>
<p><div id="result"></div></p>
<script>
// x の k 乗を N で割ったあまり
function mod_pow(x, k, N){
    if(x == 0){
        if(k == 0){
            return "Indefinite";
        }
        return 0;
    }

    let res = 1;

    while(k > 0){
        if(k % 2 == 1){
            res = (res * x) % N;
        }
        x = (x * x) % N;
        k = k >> 1;
    }

    return res;
};

const button = document.getElementById("button");
button.addEventListener("click", function(e){
    execute();
},false);

// 計算の実行
function execute(){
    const result = document.getElementById("result");

    // x, k, N に何か入力してください
    if(document.getElementById("x").value == ""
       || document.getElementById("k").value == ""
       || document.getElementById("N").value == "" ){

        result.innerHTML = '<mark>x, k, N に何か数値を入力してください．</mark>';
        return;
    }

    let x = parseInt( document.getElementById("x").value );
    let k = parseInt( document.getElementById("k").value );
    let N = parseInt( document.getElementById("N").value );

    let y = mod_pow(x, k, N);

    result.innerHTML = "<b>" + x + "^" + k + " を "+N+" で割ったあまりは "+y+" です．</b>";
};
</script>
