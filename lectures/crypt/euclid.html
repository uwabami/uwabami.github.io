          <h1 class="page-title">eu + mv = 1 を満たす u, v の組を求める.</h1>
          <hr>
<div class="grid">
<label for="e">eの値を入力<input id="e" type="number"></label>
<label for="m">mの値を入力<input id="m" type="number"></label>
</div>
<button id="button" onClick="execute()">計算</button>
<p><span id="result"></span></p>
<script>
// https://qiita.com/yumura_s/items/e4a827db7ff0530a9802
const exGcd = (n, m) => m === 0 ? [1, 0, n] : _exGcd(div(n, m), exGcd(m, mod(n, m)));
const _exGcd = (q, [y, x, d] = []) => [x, y - x * q, d];
const div = (n, m) => (n - mod(n, m)) / m;
const mod = (n, m) => (Math.abs(m) + (n % m)) % m;

function euclid(a, b){
    let res = exGcd(a, b);
    let u = res[0];
    let v = res[1];

    while(u < 0){
        u += b;
        v -= a;
    }

    while(u - b > 0){
        u -= b;
        v += a;
    }

    return [u, v];
};

const button = document.getElementById("button");
button.addEventListener("click", function(e){
    execute();
},false);

// 計算の実行
function execute(){
    const result = document.getElementById("result");

    // x, k, N に何か入力してください
    if(document.getElementById("e").value == ""
       || document.getElementById("m").value == "" ){

        result.innerHTML = '<mark>e, m に何か数値を入力してください．</mark>';
        return;
    }

    let e = parseInt( document.getElementById("e").value );
    let m = parseInt( document.getElementById("m").value );

    let res = euclid(e, m);
    result.innerHTML = "<b>" + e + "u + " + m + "v = 1 の解の一つは u = "+res[0]+", v = "+(res[1])+" です. </b>";
};
</script>
